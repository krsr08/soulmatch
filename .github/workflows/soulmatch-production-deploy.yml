name: SoulMatch Production Deploy

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: soulmatch-production
  cancel-in-progress: true

jobs:
  validate:
    name: Build and Test
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      APP_PUBLIC_API_BASE_URL: ${{ secrets.APP_PUBLIC_API_BASE_URL || 'http://20.204.142.19/api/v1/' }}
      FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID || 'soul-match-2ead9' }}
      FIREBASE_APP_ID_ANDROID: ${{ secrets.FIREBASE_APP_ID_ANDROID || '1:253330028301:android:4a4647b92b64d0ebec6244' }}
      FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
      FIREBASE_DISTRIBUTION_GROUPS: ${{ secrets.FIREBASE_DISTRIBUTION_GROUPS }}
      FIREBASE_TESTERS: ${{ secrets.FIREBASE_TESTERS }}
      RAZORPAY_KEY_ID: ${{ secrets.RAZORPAY_KEY_ID }}
      GOOGLE_WEB_CLIENT_ID: ${{ secrets.GOOGLE_WEB_CLIENT_ID || '253330028301-46qp0puk1rj2nvpmoklagv4njcta6do7.apps.googleusercontent.com' }}
      ANDROID_DISTRIBUTION_KEYSTORE_BASE64: ${{ secrets.ANDROID_DISTRIBUTION_KEYSTORE_BASE64 }}
      ANDROID_DISTRIBUTION_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_DISTRIBUTION_KEYSTORE_PASSWORD }}
      ANDROID_DISTRIBUTION_KEY_ALIAS: ${{ secrets.ANDROID_DISTRIBUTION_KEY_ALIAS }}
      ANDROID_DISTRIBUTION_KEY_PASSWORD: ${{ secrets.ANDROID_DISTRIBUTION_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate backend package locks
        shell: bash
        run: |
          set -euo pipefail
          for package_json in backend/*-service/package.json; do
            service_dir="$(dirname "$package_json")"
            echo "Installing $service_dir"
            npm --prefix "$service_dir" ci --ignore-scripts
          done

      - name: Run backend unit tests
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t test_files < <(
            find backend \
              -path '*/node_modules/*' -prune -o \
              -path '*/test/*.test.js' -type f -print | sort
          )
          if [ "${#test_files[@]}" -eq 0 ]; then
            echo "No backend unit tests found."
            exit 0
          fi
          node --test "${test_files[@]}"

      - name: Validate matching service
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r backend/matching-service/requirements.txt
          python -m compileall -q backend/matching-service/app

      - name: Build admin web
        shell: bash
        run: |
          set -euo pipefail
          npm --prefix admin-web ci
          npm --prefix admin-web run build

      - name: Build Android APKs and run unit tests
        shell: bash
        run: |
          set -euo pipefail
          chmod +x android/gradlew
          sed -i '/^org.gradle.java.home=/d' android/gradle.properties
          app_base="${APP_PUBLIC_API_BASE_URL%/}/"
          ci_debug_keystore_path=""
          if [ -n "${ANDROID_DISTRIBUTION_KEYSTORE_BASE64:-}" ]; then
            ci_debug_keystore_path="$RUNNER_TEMP/soulmatch-distribution.jks"
            printf '%s' "$ANDROID_DISTRIBUTION_KEYSTORE_BASE64" | base64 --decode > "$ci_debug_keystore_path"
          fi
          {
            echo "sdk.dir=$ANDROID_HOME"
            echo "AUTH_BASE_URL=$app_base"
            echo "PROFILE_BASE_URL=$app_base"
            echo "MATCHING_BASE_URL=$app_base"
            echo "SEARCH_BASE_URL=$app_base"
            echo "CHAT_BASE_URL=$app_base"
            echo "NOTIFICATION_BASE_URL=$app_base"
            echo "PAYMENT_BASE_URL=$app_base"
            echo "CONTROL_PLANE_BASE_URL=$app_base"
            echo "RAZORPAY_KEY_ID=${RAZORPAY_KEY_ID:-rzp_test_placeholder}"
            echo "GOOGLE_WEB_CLIENT_ID=${GOOGLE_WEB_CLIENT_ID:-}"
            if [ -n "$ci_debug_keystore_path" ]; then
              echo "CI_DEBUG_KEYSTORE_PATH=$ci_debug_keystore_path"
              echo "CI_DEBUG_KEYSTORE_PASSWORD=${ANDROID_DISTRIBUTION_KEYSTORE_PASSWORD:-}"
              echo "CI_DEBUG_KEY_ALIAS=${ANDROID_DISTRIBUTION_KEY_ALIAS:-}"
              echo "CI_DEBUG_KEY_PASSWORD=${ANDROID_DISTRIBUTION_KEY_PASSWORD:-}"
            fi
          } > android/local.properties

          if [ -n "${FIREBASE_SERVICE_ACCOUNT_JSON:-}" ]; then
            test -n "$GOOGLE_WEB_CLIENT_ID" || {
              echo "GOOGLE_WEB_CLIENT_ID is required for Firebase-distributed builds with Google Sign-In."
              exit 1
            }
            case "$GOOGLE_WEB_CLIENT_ID" in
              253330028301-*.apps.googleusercontent.com) ;;
              *)
                echo "GOOGLE_WEB_CLIENT_ID must belong to Firebase project soul-match-2ead9/project number 253330028301."
                echo "Use the Web OAuth client ID from that same Google Cloud project, not an Android client ID or an old project."
                exit 1
                ;;
            esac
            test -n "$ci_debug_keystore_path" || {
              echo "ANDROID_DISTRIBUTION_KEYSTORE_BASE64 is required so Firebase-distributed APKs use a stable SHA key."
              exit 1
            }
            test -n "${ANDROID_DISTRIBUTION_KEYSTORE_PASSWORD:-}" || { echo "ANDROID_DISTRIBUTION_KEYSTORE_PASSWORD is required."; exit 1; }
            test -n "${ANDROID_DISTRIBUTION_KEY_ALIAS:-}" || { echo "ANDROID_DISTRIBUTION_KEY_ALIAS is required."; exit 1; }
            test -n "${ANDROID_DISTRIBUTION_KEY_PASSWORD:-}" || { echo "ANDROID_DISTRIBUTION_KEY_PASSWORD is required."; exit 1; }
          fi
          cd android
          ./gradlew :app:assembleDebug :app:assembleRelease :app:testDebugUnitTest --no-daemon

      - name: Print distributed APK signing fingerprints
        shell: bash
        run: |
          set -euo pipefail
          latest_build_tools="$(find "$ANDROID_HOME/build-tools" -maxdepth 1 -mindepth 1 -type d | sort -V | tail -n 1)"
          "$latest_build_tools/apksigner" verify --print-certs android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Android debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: soulmatch-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Upload Android release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: soulmatch-release-unsigned-apk
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
          if-no-files-found: error

      - name: Distribute Android debug APK to Firebase App Distribution
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${FIREBASE_SERVICE_ACCOUNT_JSON:-}" ]; then
            echo "Skipping Firebase App Distribution: FIREBASE_SERVICE_ACCOUNT_JSON is not configured."
            exit 0
          fi
          if [ -z "${FIREBASE_DISTRIBUTION_GROUPS:-}" ] && [ -z "${FIREBASE_TESTERS:-}" ]; then
            echo "Skipping Firebase App Distribution: set FIREBASE_DISTRIBUTION_GROUPS or FIREBASE_TESTERS."
            exit 0
          fi

          credentials_file="$RUNNER_TEMP/firebase-service-account.json"
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT_JSON" > "$credentials_file"
          export GOOGLE_APPLICATION_CREDENTIALS="$credentials_file"

          release_notes_file="$RUNNER_TEMP/firebase-release-notes.txt"
          {
            echo "SoulMatch automated test build"
            echo "Commit: ${GITHUB_SHA}"
            echo "Branch: ${GITHUB_REF_NAME}"
            echo "Workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo "Backend: ${APP_PUBLIC_API_BASE_URL}"
          } > "$release_notes_file"

          command=(
            npx -y firebase-tools@latest
            appdistribution:distribute
            android/app/build/outputs/apk/debug/app-debug.apk
            --project "$FIREBASE_PROJECT_ID"
            --app "$FIREBASE_APP_ID_ANDROID"
            --release-notes-file "$release_notes_file"
          )

          if [ -n "${FIREBASE_DISTRIBUTION_GROUPS:-}" ]; then
            command+=(--groups "$FIREBASE_DISTRIBUTION_GROUPS")
          fi
          if [ -n "${FIREBASE_TESTERS:-}" ]; then
            command+=(--testers "$FIREBASE_TESTERS")
          fi

          "${command[@]}"

  deploy:
    name: Deploy to Azure VM
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 45
    environment: production

    env:
      AZURE_VM_HOST: ${{ secrets.AZURE_VM_HOST }}
      AZURE_VM_USER: ${{ secrets.AZURE_VM_USER }}
      AZURE_VM_SSH_KEY: ${{ secrets.AZURE_VM_SSH_KEY }}
      AZURE_VM_PORT: ${{ secrets.AZURE_VM_PORT || '22' }}
      AZURE_DEPLOY_PATH: ${{ secrets.AZURE_DEPLOY_PATH || '/home/azureuser/soulmatch' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SSH and rsync clients
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y openssh-client rsync

      - name: Configure SSH
        shell: bash
        run: |
          set -euo pipefail
          test -n "$AZURE_VM_HOST"
          test -n "$AZURE_VM_USER"
          test -n "$AZURE_VM_SSH_KEY"
          mkdir -p ~/.ssh
          printf '%s\n' "$AZURE_VM_SSH_KEY" > ~/.ssh/soulmatch_deploy_key
          chmod 600 ~/.ssh/soulmatch_deploy_key
          ssh-keyscan -p "$AZURE_VM_PORT" "$AZURE_VM_HOST" >> ~/.ssh/known_hosts

      - name: Verify VM production env exists
        shell: bash
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/soulmatch_deploy_key -p "$AZURE_VM_PORT" "$AZURE_VM_USER@$AZURE_VM_HOST" \
            "mkdir -p '$AZURE_DEPLOY_PATH' && test -f '$AZURE_DEPLOY_PATH/docker/production.env'"

      - name: Sync source to Azure VM
        shell: bash
        run: |
          set -euo pipefail
          rsync -az --delete \
            -e "ssh -i ~/.ssh/soulmatch_deploy_key -p $AZURE_VM_PORT" \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude '.gradle-user/' \
            --exclude 'node_modules/' \
            --exclude '*/node_modules/' \
            --exclude 'android/.gradle/' \
            --exclude 'android/build/' \
            --exclude 'android/app/build/' \
            --exclude 'android/local.properties' \
            --exclude 'android/*.hprof' \
            --exclude 'android/java_pid*.hprof' \
            --exclude 'admin-web/build/' \
            --exclude 'backend/*/.env' \
            --exclude 'backend/*/uploads/' \
            --exclude 'docker/production.env' \
            --exclude 'client_secret*.json' \
            --exclude 'key.txt' \
            --exclude '*.apk' \
            --exclude '*.aab' \
            --exclude '*.keystore' \
            ./ "$AZURE_VM_USER@$AZURE_VM_HOST:$AZURE_DEPLOY_PATH/"

      - name: Run production deploy
        shell: bash
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/soulmatch_deploy_key -p "$AZURE_VM_PORT" "$AZURE_VM_USER@$AZURE_VM_HOST" \
            "cd '$AZURE_DEPLOY_PATH' && DEPLOYED_SOURCE_COMMIT='${GITHUB_SHA}' DEPLOYED_SOURCE_BRANCH='${GITHUB_REF_NAME}' bash tools/deploy-production.sh"
