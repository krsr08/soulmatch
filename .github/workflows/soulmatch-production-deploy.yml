name: SoulMatch Production Deploy

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: soulmatch-production
  cancel-in-progress: false

jobs:
  validate:
    name: Build and Test
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate backend package locks
        shell: bash
        run: |
          set -euo pipefail
          for package_json in backend/*-service/package.json; do
            service_dir="$(dirname "$package_json")"
            echo "Installing $service_dir"
            npm --prefix "$service_dir" ci --ignore-scripts
          done

      - name: Validate matching service
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r backend/matching-service/requirements.txt
          python -m compileall -q backend/matching-service/app

      - name: Build admin web
        shell: bash
        run: |
          set -euo pipefail
          npm --prefix admin-web ci
          npm --prefix admin-web run build

      - name: Build Android APKs and run unit tests
        shell: bash
        run: |
          set -euo pipefail
          chmod +x android/gradlew
          sed -i '/^org.gradle.java.home=/d' android/gradle.properties
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
          cd android
          ./gradlew :app:assembleDebug :app:assembleRelease :app:testDebugUnitTest --no-daemon

      - name: Upload Android release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: soulmatch-release-unsigned-apk
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
          if-no-files-found: error

  deploy:
    name: Deploy to Azure VM
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 45
    environment: production

    env:
      AZURE_VM_HOST: ${{ secrets.AZURE_VM_HOST }}
      AZURE_VM_USER: ${{ secrets.AZURE_VM_USER }}
      AZURE_VM_SSH_KEY: ${{ secrets.AZURE_VM_SSH_KEY }}
      AZURE_VM_PORT: ${{ secrets.AZURE_VM_PORT || '22' }}
      AZURE_DEPLOY_PATH: ${{ secrets.AZURE_DEPLOY_PATH || '/home/azureuser/soulmatch' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SSH and rsync clients
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y openssh-client rsync

      - name: Configure SSH
        shell: bash
        run: |
          set -euo pipefail
          test -n "$AZURE_VM_HOST"
          test -n "$AZURE_VM_USER"
          test -n "$AZURE_VM_SSH_KEY"
          mkdir -p ~/.ssh
          printf '%s\n' "$AZURE_VM_SSH_KEY" > ~/.ssh/soulmatch_deploy_key
          chmod 600 ~/.ssh/soulmatch_deploy_key
          ssh-keyscan -p "$AZURE_VM_PORT" "$AZURE_VM_HOST" >> ~/.ssh/known_hosts

      - name: Verify VM production env exists
        shell: bash
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/soulmatch_deploy_key -p "$AZURE_VM_PORT" "$AZURE_VM_USER@$AZURE_VM_HOST" \
            "mkdir -p '$AZURE_DEPLOY_PATH' && test -f '$AZURE_DEPLOY_PATH/docker/production.env'"

      - name: Sync source to Azure VM
        shell: bash
        run: |
          set -euo pipefail
          rsync -az --delete \
            -e "ssh -i ~/.ssh/soulmatch_deploy_key -p $AZURE_VM_PORT" \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude '.gradle-user/' \
            --exclude 'node_modules/' \
            --exclude '*/node_modules/' \
            --exclude 'android/.gradle/' \
            --exclude 'android/build/' \
            --exclude 'android/app/build/' \
            --exclude 'android/local.properties' \
            --exclude 'android/*.hprof' \
            --exclude 'android/java_pid*.hprof' \
            --exclude 'admin-web/build/' \
            --exclude 'backend/*/.env' \
            --exclude 'backend/*/uploads/' \
            --exclude 'docker/production.env' \
            --exclude 'client_secret*.json' \
            --exclude 'key.txt' \
            --exclude '*.apk' \
            --exclude '*.aab' \
            --exclude '*.keystore' \
            ./ "$AZURE_VM_USER@$AZURE_VM_HOST:$AZURE_DEPLOY_PATH/"

      - name: Run production deploy
        shell: bash
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/soulmatch_deploy_key -p "$AZURE_VM_PORT" "$AZURE_VM_USER@$AZURE_VM_HOST" \
            "cd '$AZURE_DEPLOY_PATH' && bash tools/deploy-production.sh"
