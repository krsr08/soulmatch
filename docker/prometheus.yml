global:
  scrape_interval: 15s

rule_files:
  - /etc/prometheus/soulmatch-alert-rules.yml

scrape_configs:
  - job_name: soulmatch-services
    metrics_path: /metrics
    static_configs:
      - targets:
          - auth-service:3001
          - profile-service:3002
          - matching-service:3003
          - search-service:3004
          - chat-service:3005
          - notification-service:3006
          - payment-service:3007
          - admin-service:3011
