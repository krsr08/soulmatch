version: '3.8'

services:

  postgres:
    image: postgres:15
    container_name: soulmatch-postgres
    environment:
      POSTGRES_USER: soulmatch_user
      POSTGRES_PASSWORD: soulmatch_pass
      POSTGRES_DB: soulmatch_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ../database/seeds/seed_data.sql:/docker-entrypoint-initdb.d/02_seed.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U soulmatch_user']
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7
    container_name: soulmatch-mongo
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: soulmatch-redis
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

  auth-service:
    build:
      context: ../backend/auth-service
      dockerfile: Dockerfile
    container_name: soulmatch-auth
    ports:
      - '3001:3001'
    env_file:
      - ../backend/auth-service/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: npm start

  profile-service:
    build:
      context: ../backend/profile-service
      dockerfile: Dockerfile
    container_name: soulmatch-profile
    ports:
      - '3002:3002'
    env_file:
      - ../backend/profile-service/.env
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  mongo_data:
  redis_data: